<div class="bg-white/40 backdrop-blur-sm rounded-2xl p-4">
  <div class="grid grid-cols-2 gap-4">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-orange-100/60 flex items-center justify-center text-orange-700">
        <tui-icon icon="@tui.map-pin" [style.color]="'var(--tui-background-accent-1)'" [style.font-size.rem]="1.5" />
      </div>
      <div>
        <div class="text-xs text-orange-800/50">Conditions</div>
        <div class="text-sm text-orange-900/80 capitalize">partly cloudy</div>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-blue-100/60 flex items-center justify-center text-blue-700">
        <tui-icon icon="@tui.map-pin" [style.color]="'var(--tui-background-accent-1)'" [style.font-size.rem]="1.5" />
      </div>
      <div>
        <div class="text-xs text-orange-800/50">Precipitation</div>
        <div class="text-sm text-orange-900/80">15%</div>
      </div>
    </div>
  </div>
</div>

<div class="mb-2">
  <span class="text-xs text-orange-900/60 tracking-wide font-semibold"> CLOUD COVERAGE </span>
</div>
<div class="space-y-3">
  <div class="flex items-center justify-between">
    <span class="text-xs text-orange-800/50 w-20">Low</span>

    <div class="flex-1 h-2 bg-orange-200/40 rounded-full overflow-hidden">
      <progress
        max="100"
        size="s"
        tuiProgressBar
        class="progress"
        color="linear-gradient(to right, #2196F399, var(--tui-chart-categorical-12))"
        [value]="slowValue$ | async"
      ></progress>
    </div>

    <span class="text-xs text-orange-800/50 w-20 text-right">5 - 15 %</span>
  </div>
  <div class="flex items-center justify-between">
    <span class="text-xs text-orange-800/50 w-20">Medium</span>

    <div class="flex-1 h-2 bg-orange-200/40 rounded-full overflow-hidden">
      <progress
        max="100"
        size="s"
        tuiProgressBar
        class="progress"
        [tuiProgressColorSegments]="['#2196F399']"
        [value]="slowValue$ | async"
      ></progress>
    </div>

    <span class="text-xs text-orange-800/50 w-20 text-right">20 - 35 %</span>
  </div>
  <div class="flex items-center justify-between">
    <span class="text-xs text-orange-800/50 w-20">High</span>

    <div class="flex-1 h-2 bg-orange-200/40 rounded-full overflow-hidden">
      <progress
        max="100"
        size="s"
        tuiProgressBar
        class="progress"
        [tuiProgressColorSegments]="['#2196F3BB']"
        [value]="slowValue$ | async"
      ></progress>
    </div>

    <span class="text-xs text-orange-800/50 w-20 text-right">40 - 45%</span>
  </div>
</div>
